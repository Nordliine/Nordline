  <text x="144" y="286" fill="#111827" font-size="66" font-family="Manrope, Segoe UI, sans-serif" font-weight="800">Сайты, которые приносят</text>
  <text x="144" y="362" fill="#111827" font-size="66" font-family="Manrope, Segoe UI, sans-serif" font-weight="800">клиентов и доверие</text>
  <text x="144" y="445" fill="#334155" font-size="32" font-family="Manrope, Segoe UI, sans-serif">UX, разработка, анимации, SEO - под ключ</text>
