      <stop offset="0%" stop-color="#f6f7f2" />
      <stop offset="100%" stop-color="#e9f4ef" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f766e" />
      <stop offset="100%" stop-color="#ef8354" />
